# SalesBooster AI — local / VPS stack
# Usage: copy django_backend/.env.example → django_backend/.env, set secrets, then:
#   docker compose up --build
#
# UI: http://localhost:8080  |  API health: http://localhost:8080/api/health

services:
  backend:
    build: ./django_backend
    container_name: salesbooster-api
    env_file:
      - ./django_backend/.env
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DJANGO_CORS_ALLOWED_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
      DJANGO_SQLITE_PATH: /data/db.sqlite3
    volumes:
      - sqlite_data:/data
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn server.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: salesbooster-web
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
